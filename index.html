<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SVG 轉 G-Code | 網頁版 CAM 工具</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Three.js for 3D Viewer -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>

<body>
    <div class="app-container">
        <!-- Header -->
        <header class="app-header">
            <div class="logo-area">
                <div class="logo-icon">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="16 18 22 12 16 6"></polyline>
                        <polyline points="8 6 2 12 8 18"></polyline>
                    </svg>
                </div>
                <div>
                    <h1 class="app-title">SVG 轉 G-Code</h1>
                    <p class="app-subtitle">快速、免安裝的本機 SVG 轉 CNC 加工路徑工具</p>
                </div>
            </div>
        </header>

        <div class="main-content">
            <!-- Left Side: Uploader and Preview -->
            <div class="preview-section pane">
                <div class="section-header" style="display: flex; justify-content: space-between; align-items: center;">
                    <h2>設計圖片</h2>
                    <div class="view-tabs" style="display: flex; gap: 8px;">
                        <button id="tab2D" class="tab-btn active">2D SVG 視圖</button>
                        <button id="tab3D" class="tab-btn">3D 刀路預覽</button>
                    </div>
                </div>

                <div class="upload-area" id="dropZone">
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
                        stroke-linecap="round" stroke-linejoin="round" class="upload-icon">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                        <polyline points="17 8 12 3 7 8"></polyline>
                        <line x1="12" y1="3" x2="12" y2="15"></line>
                    </svg>
                    <h3>將 SVG 檔案拖曳至此</h3 <p>或點擊以選擇檔案</p>
                    <input type="file" id="fileInput" accept=".svg" hidden>
                </div>

                <div class="svg-preview-container">
                    <div class="toolpath-mode-selector"
                        style="margin-bottom: 10px; display: flex; gap: 15px; align-items: center;">
                        <span style="font-weight: 600; font-size: 0.9rem;">選擇線段刀路模式：</span>
                        <label style="display: flex; align-items: center; gap: 5px; cursor: pointer; color: #9ca3af;">
                            <input type="radio" name="toolpathMode" value="none" checked>
                            <span>不加工 (None)</span>
                        </label>
                        <label style="display: flex; align-items: center; gap: 5px; cursor: pointer; color: #3b82f6;">
                            <input type="radio" name="toolpathMode" value="outside">
                            <span>銑線外 (Outside)</span>
                        </label>
                        <label style="display: flex; align-items: center; gap: 5px; cursor: pointer; color: #ef4444;">
                            <input type="radio" name="toolpathMode" value="inside">
                            <span>銑線內 (Inside)</span>
                        </label>
                        <label style="display: flex; align-items: center; gap: 5px; cursor: pointer; color: #f59e0b;">
                            <input type="radio" name="toolpathMode" value="drill">
                            <span>鑽孔 (Drill)</span>
                        </label>
                        <label
                            style="display: flex; align-items: center; gap: 5px; cursor: pointer; color: var(--text-main);">
                            <input type="radio" name="toolpathMode" value="on-path">
                            <span>銑線上 (On Path)</span>
                        </label>
                    </div>
                    <div style="font-size: 0.8rem; color: var(--text-muted); margin-bottom: 10px;">
                        提示：請先在上方選擇模式，然後在下方圖片點擊線段來套用設定。
                    </div>
                    <div id="previewSvg">
                        <!-- SVG will be injected here -->
                    </div>
                    <div id="preview3D" style="display: none; width: 100%; height: 100%; position: relative;">
                        <!-- 3D Canvas will be injected here -->

                        <!-- 3D Animation Controls Overlay -->
                        <div class="viewer-controls" id="animControls" style="display: none;">
                            <button id="btnPlayPause" class="ctrl-btn" title="播放/暫停 (Space)">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2" stroke-linejoin="round">
                                    <polygon points="5 3 19 12 5 21 5 3"></polygon>
                                </svg>
                            </button>
                            <button id="btnReset" class="ctrl-btn" title="重置回放">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M3 2v6h6"></path>
                                    <path d="M3 13a9 9 0 1 0 3-7.7L3 8"></path>
                                </svg>
                            </button>

                            <div class="progress-container">
                                <span id="lblProgress">0%</span>
                                <input type="range" id="progressSlider" min="0" max="100" value="0" step="0.1">
                                <span id="lblTime">00:00</span>
                            </div>

                            <div class="speed-control">
                                <span title="播放速率">🏃</span>
                                <select id="speedSelect">
                                    <option value="1" selected>1x</option>
                                    <option value="2">2x</option>
                                    <option value="5">5x</option>
                                    <option value="10">10x</option>
                                    <option value="50">MAX</option>
                                </select>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Right Side: Settings -->
            <div class="settings-section pane">
                <div class="section-header">
                    <h2>CAM 加工參數</h2>
                </div>

                <div class="settings-grid">
                    <div class="input-group">
                        <label for="thickness">材料厚度 (mm)</label>
                        <input type="number" id="thickness" value="3" step="0.5">
                    </div>

                    <div class="input-group">
                        <label for="overcut">過切深度 / Overcut (mm)</label>
                        <input type="number" id="overcut" value="0.5" step="0.1">
                    </div>

                    <div class="input-group">
                        <label for="stepdown">每層下刀量 (mm)</label>
                        <input type="number" id="stepdown" value="1.0" step="0.1">
                    </div>

                    <div class="input-group">
                        <label for="safeZ">安全高度 Safe Z (mm)</label>
                        <input type="number" id="safeZ" value="5" step="1">
                    </div>

                    <div class="input-group">
                        <label for="feedXY">XY 軸進給率 (mm/min)</label>
                        <input type="number" id="feedXY" value="1000" step="100">
                    </div>

                    <div class="input-group">
                        <label for="feedZ">Z 軸下刀進給率 (mm/min)</label>
                        <input type="number" id="feedZ" value="300" step="50">
                    </div>

                    <div class="input-group">
                        <label for="spindle">主軸轉速 (RPM)</label>
                        <input type="number" id="spindle" value="10000" step="1000">
                    </div>

                    <div class="input-group">
                        <label for="toolD">刀具直徑 (mm)</label>
                        <input type="number" id="toolD" value="3.175" step="0.01">
                    </div>

                    <div class="input-group fw">
                        <label for="postProcessor">後處理器格式</label>
                        <select id="postProcessor">
                            <option value="grbl">通用 GRBL</option>
                            <option value="mach3">Mach3</option>
                        </select>
                    </div>

                    <div class="input-group fw">
                        <label for="rotateAngle">工件旋轉角度 (度)</label>
                        <input type="number" id="rotateAngle" value="0" step="15" title="可輸入正負角度，順時針為正">
                    </div>

                    <div class="input-group fw">
                        <label for="originMode">工件原點 (Work Origin)</label>
                        <select id="originMode">
                            <option value="top-center">頂面中心</option>
                            <option value="top-bottomleft" selected>頂面左下角</option>
                            <option value="bottom-center">底面中心</option>
                            <option value="bottom-bottomleft">底面左下角</option>
                        </select>
                    </div>
                </div>

                <div class="settings-section pane" style="margin-top: 15px; padding: 15px;">
                    <div class="section-header" style="margin-bottom: 10px;">
                        <h2 style="font-size: 1rem;">加工順序 (上下拖曳以排序)</h2>
                    </div>
                    <div class="toolpath-list-container" id="toolpathList"
                        style="border: 1px solid var(--border); border-radius: 4px; padding: 5px; background: rgba(0,0,0,0.2);">
                        <div style="padding: 10px; color: var(--text-muted); text-align: center; font-size: 0.85rem;">
                            等待載入 SVG 檔案...</div>
                    </div>
                </div>

                <div class="action-bar">
                    <button class="btn btn-primary" id="generateBtn" disabled>
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                            <polyline points="7 10 12 15 17 10"></polyline>
                            <line x1="12" y1="15" x2="12" y2="3"></line>
                        </svg>
                        生成並下載 G-Code 檔案
                    </button>
                </div>

                <div class="console-log">
                    <div class="log-header">系統訊息日誌</div>
                    <pre id="logText">等待載入 SVG 檔案...</pre>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="js/app.js"></script>
</body>

</html>
