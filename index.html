<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SVG / DXF 轉 G-Code | 網頁版 CAM 工具</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Three.js for 3D Viewer -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>

<body>
    <div class="app-container">
        <!-- Header -->
        <header class="app-header">
            <div class="logo-area">
                <div class="logo-icon">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="16 18 22 12 16 6"></polyline>
                        <polyline points="8 6 2 12 8 18"></polyline>
                    </svg>
                </div>
                <div>
                    <h1 class="app-title">SVG / DXF 轉 G-Code</h1>
                    <p class="app-subtitle">快速、免安裝的本機 SVG / DXF 轉 CNC 加工路徑工具</p>
                </div>
            </div>
            <div class="theme-switch">
                <label for="themeSelect">風格</label>
                <select id="themeSelect">
                    <option value="dark" selected>深色</option>
                    <option value="light">淺色</option>
                </select>
            </div>
        </header>

        <div class="main-content">
            <!-- Left Side: Uploader and Preview -->
            <div class="preview-section pane">
                <div class="section-header" style="display: flex; justify-content: space-between; align-items: center;">
                    <h2>設計圖片</h2>
                    <div class="view-tabs" style="display: flex; gap: 8px;">
                        <button id="tab2D" class="tab-btn active">2D 圖形視圖</button>
                        <button id="tab3D" class="tab-btn">3D 刀路預覽</button>
                    </div>
                </div>

                <div class="upload-area" id="dropZone">
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
                        stroke-linecap="round" stroke-linejoin="round" class="upload-icon">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                        <polyline points="17 8 12 3 7 8"></polyline>
                        <line x1="12" y1="3" x2="12" y2="15"></line>
                    </svg>
                    <h3>將 SVG / DXF 檔案拖曳至此</h3>
                    <p>或點擊以選擇檔案</p>
                    <input type="file" id="fileInput" accept=".svg,.dxf" hidden>
                </div>

                <div class="svg-preview-container">
                    <div class="toolpath-mode-selector"
                        style="margin-bottom: 10px; display: flex; gap: 15px; align-items: center;">
                        <span style="font-weight: 600; font-size: 0.9rem;">選擇線段刀路模式：</span>
                        <label style="display: flex; align-items: center; gap: 5px; cursor: pointer; color: #9ca3af;">
                            <input type="radio" name="toolpathMode" value="none" checked>
                            <span>不加工 (None)</span>
                        </label>
                        <label style="display: flex; align-items: center; gap: 5px; cursor: pointer; color: #3b82f6;">
                            <input type="radio" name="toolpathMode" value="outside">
                            <span>銑線外 (Outside)</span>
                        </label>
                        <label style="display: flex; align-items: center; gap: 5px; cursor: pointer; color: #ef4444;">
                            <input type="radio" name="toolpathMode" value="inside">
                            <span>銑線內 (Inside)</span>
                        </label>
                        <label style="display: flex; align-items: center; gap: 5px; cursor: pointer; color: #f59e0b;">
                            <input type="radio" name="toolpathMode" value="drill">
                            <span>鑽孔 (Drill)</span>
                        </label>
                        <label
                            style="display: flex; align-items: center; gap: 5px; cursor: pointer; color: var(--text-main);">
                            <input type="radio" name="toolpathMode" value="on-path">
                            <span>銑線上 (On Path)</span>
                        </label>
                    </div>
                    <div style="font-size: 0.8rem; color: var(--text-muted); margin-bottom: 10px;">
                        提示：2D 視圖僅支援滾輪縮放與拖曳框選；3D 視圖才支援拖曳移動與改變視角。請先在上方選擇模式，再於下方 2D 圖形點擊或拖曳框選路徑來套用設定。
                    </div>
                    <div id="previewSvg">
                        <!-- SVG will be injected here -->
                    </div>
                    <div id="preview3D" style="display: none; width: 100%; height: 100%; position: relative;">
                        <!-- 3D Canvas will be injected here -->

                        <!-- 3D Animation Controls Overlay -->
                        <div class="viewer-controls" id="animControls" style="display: none;">
                            <button id="btnPlayPause" class="ctrl-btn" title="播放/暫停 (Space)">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2" stroke-linejoin="round">
                                    <polygon points="5 3 19 12 5 21 5 3"></polygon>
                                </svg>
                            </button>
                            <button id="btnResetView" class="ctrl-btn" title="回到原始視角">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M12 3l7 4v10l-7 4-7-4V7l7-4z"></path>
                                    <path d="M12 8v8"></path>
                                    <path d="M8.5 10 12 8l3.5 2"></path>
                                </svg>
                            </button>
                            <button id="btnReset" class="ctrl-btn" title="重置回放">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M3 2v6h6"></path>
                                    <path d="M3 13a9 9 0 1 0 3-7.7L3 8"></path>
                                </svg>
                            </button>

                            <div class="progress-container">
                                <span id="lblProgress">0%</span>
                                <input type="range" id="progressSlider" min="0" max="100" value="0" step="0.1">
                                <span id="lblTime">00:00</span>
                            </div>

                            <div class="speed-control">
                                <span title="播放速率">🏃</span>
                                <select id="speedSelect">
                                    <option value="1" selected>1x</option>
                                    <option value="2">2x</option>
                                    <option value="5">5x</option>
                                    <option value="10">10x</option>
                                    <option value="50">MAX</option>
                                </select>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Right Side: Settings -->
            <div class="settings-section pane collapsible-panel">
                <div class="section-header panel-header">
                    <h2>CAM 加工參數</h2>
                    <button type="button" class="panel-toggle-btn" data-panel-toggle="camSettingsBody" aria-expanded="false" aria-label="展開 CAM 加工參數">+</button>
                </div>

                <div class="panel-content" id="camSettingsBody" hidden>
                <div class="settings-kv">
                    <div class="kv-row">
                        <label class="kv-label" for="thickness">材料厚度 (mm)</label>
                        <input class="kv-field" type="number" id="thickness" value="7" step="0.5">
                    </div>
                    <div class="kv-row">
                        <label class="kv-label" for="materialMargin">胚料邊距 (mm)</label>
                        <input class="kv-field" type="number" id="materialMargin" value="4" step="1" title="3D預覽中胚料大於圖形的邊距">
                    </div>
                    <div class="kv-row">
                        <label class="kv-label" for="overcut">過切深度 / Overcut (mm)</label>
                        <input class="kv-field" type="number" id="overcut" value="0.0" step="0.1">
                    </div>
                    <div class="kv-row">
                        <label class="kv-label" for="stepdown">每層下刀量 (mm)</label>
                        <input class="kv-field" type="number" id="stepdown" value="1.5" step="0.1">
                    </div>
                    <div class="kv-row">
                        <label class="kv-label" for="safeZ">安全高度 Safe Z (mm)</label>
                        <input class="kv-field" type="number" id="safeZ" value="10" step="1">
                    </div>
                    <div class="kv-row">
                        <label class="kv-label" for="feedXY">XY 軸進給率 (mm/min)</label>
                        <input class="kv-field" type="number" id="feedXY" value="1000" step="100">
                    </div>
                    <div class="kv-row">
                        <label class="kv-label" for="feedZ">Z 軸下刀進給率 (mm/min)</label>
                        <input class="kv-field" type="number" id="feedZ" value="300" step="50">
                    </div>
                    <div class="kv-row">
                        <label class="kv-label" for="spindle">主軸轉速 (RPM)</label>
                        <input class="kv-field" type="number" id="spindle" value="10000" step="1000">
                    </div>
                    <div class="kv-row">
                        <label class="kv-label" for="toolD">刀具直徑 (mm)</label>
                        <input class="kv-field" type="number" id="toolD" value="4" step="0.01">
                    </div>
                    <div class="kv-row">
                        <label class="kv-label" for="postProcessor">後處理器格式</label>
                        <select class="kv-field" id="postProcessor">
                            <option value="grbl">通用 GRBL</option>
                            <option value="mach3">Mach3</option>
                        </select>
                    </div>
                    <div class="kv-row">
                        <label class="kv-label" for="rotateAngle">工件旋轉角度 (度)</label>
                        <input class="kv-field" type="number" id="rotateAngle" value="0" step="15" title="可輸入正負角度，順時針為正">
                    </div>
                    <div class="kv-row">
                        <label class="kv-label" for="originMode">工件原點 (Work Origin)</label>
                        <select class="kv-field" id="originMode">
                            <option value="top-center">頂面中心</option>
                            <option value="top-bottomleft">頂面左下角</option>
                            <option value="bottom-center">底面中心</option>
                            <option value="bottom-bottomleft" selected>底面左下角</option>
                        </select>
                    </div>
                </div>
                </div>

                <!-- Tab / Bridge Settings -->
                <div class="settings-section pane settings-subpanel collapsible-panel">
                    <div class="section-header panel-header panel-header-inline">
                        <h2 class="subpanel-title">固定支撐橋 (Tabs / Bridges)</h2>
                        <div class="panel-header-actions">
                        <label class="panel-inline-check">
                            <input type="checkbox" id="tabEnable" style="width:14px;height:14px;">
                            啟用
                        </label>
                        <button type="button" class="panel-toggle-btn" data-panel-toggle="tabsPanelBody" aria-expanded="false" aria-label="展開固定支撐橋">+</button>
                        </div>
                    </div>
                    <div class="panel-content" id="tabsPanelBody" hidden>
                    <div id="tabSettings" style="display:none;">
                        <div class="settings-kv tab-kv">
                            <div class="kv-row">
                                <label class="kv-label" for="tabCount">數量 (個)</label>
                                <input class="kv-field" type="number" id="tabCount" value="4" step="1" min="1">
                            </div>
                            <div class="kv-row">
                                <label class="kv-label" for="tabWidth">寬度 (mm)</label>
                                <input class="kv-field" type="number" id="tabWidth" value="4" step="0.5" min="0.5">
                            </div>
                            <div class="kv-row">
                                <label class="kv-label" for="tabThickness">橋厚度 (mm) <span style="color:var(--text-muted);font-weight:400;">— 保留多少材料不切斷</span></label>
                                <input class="kv-field" type="number" id="tabThickness" value="1" step="0.5" min="0.1">
                            </div>
                        </div>
                    </div>
                    </div>
                </div>

                <div class="settings-section pane settings-subpanel collapsible-panel">
                    <div class="section-header panel-header">
                        <h2 class="subpanel-title">加工順序 (上下拖曳以排序)</h2>
                        <button type="button" class="panel-toggle-btn" data-panel-toggle="toolpathOrderBody" aria-expanded="false" aria-label="展開加工順序">+</button>
                    </div>
                    <div class="panel-content" id="toolpathOrderBody" hidden>
                    <div class="toolpath-list-container" id="toolpathList">
                        <div style="padding: 10px; color: var(--text-muted); text-align: center; font-size: 0.85rem;">
                            等待載入 SVG / DXF 檔案...</div>
                    </div>
                    </div>
                </div>

                <div class="action-bar">
                    <button class="btn btn-primary" id="generateBtn" disabled>
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                            <polyline points="7 10 12 15 17 10"></polyline>
                            <line x1="12" y1="15" x2="12" y2="3"></line>
                        </svg>
                        生成並下載 G-Code 檔案
                    </button>
                </div>

                <div class="console-log">
                    <div class="log-header">系統訊息日誌</div>
                    <pre id="logText">等待載入 SVG / DXF 檔案...</pre>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="js/app.js"></script>
</body>

</html>
